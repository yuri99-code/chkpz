version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: modx_nginx
    ports:
      - "8080:80"
    volumes:
      - ./modx:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - modx_net

  php:
    build: ./php
    container_name: modx_php
    volumes:
      - ./modx:/var/www/html
    networks:
      - modx_net

  db:
    image: mariadb:10.6
    container_name: modx_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: modx
      MYSQL_USER: modx
      MYSQL_PASSWORD: modx
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - modx_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: modx_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - modx_net

volumes:
  db_data:

networks:
  modx_net: